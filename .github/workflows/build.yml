name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
      build:
        description: 'Build date'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.1'

      - name: Build linux amd64
        run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -buildid=" -o dist/gmfi-linux-amd64 .

      - name: Build linux arm64
        run: GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w -buildid=" -o dist/gmfi-linux-arm64 .

      - name: Build macos arm64
        run: GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w -buildid=" -o dist/gmfi-macos-arm64 .

      - name: Create tag
        run: |
          git tag ${{ github.event.inputs.version }} || true
          git push origin ${{ github.event.inputs.version }} || true
    
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "gmfi ${{ github.event.inputs.version }} | Build ${{ github.event.inputs.build }}"
          generate_release_notes: true
          files: |
            dist/gmfi-linux-amd64
            dist/gmfi-linux-arm64
            dist/gmfi-macos-arm64
          draft: false
          prerelease: false
